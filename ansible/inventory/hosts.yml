# Инвентарь VPN-инфраструктуры
#
# Exit-ноды доступны ТОЛЬКО через Cloudflare Tunnel SSH.
# Для подключения нужен cloudflared на управляющей машине:
#   ansible-playbook playbooks/exit-node.yml
#
# При первом деплое используйте обычный SSH (ansible_host = реальный IP),
# после настройки туннеля переключитесь на ProxyCommand.

all:
  children:
    exit_nodes:
      hosts:
        exit01:
          # Первый деплой — прямой SSH:
          ansible_host: "{{ exit01_real_ip }}"
          ansible_user: root
          # После настройки туннеля — раскомментировать:
          # ansible_ssh_common_args: >-
          #   -o ProxyCommand="cloudflared access ssh --hostname ssh1.{{ cf_domain }}"
          node_number: 1

        # exit02:
        #   ansible_host: "{{ exit02_real_ip }}"
        #   ansible_user: root
        #   node_number: 2
