# Роль wstunnel: WebSocket-туннель для AWG трафика
# - Скачивание бинарника wstunnel v10+ с GitHub
# - Systemd unit с привязкой к AWG
# - Слушает TCP :8080 (localhost), форвардит UDP на :51820

---
- name: Определить архитектуру
  set_fact:
    wstunnel_arch: "{{ 'x86_64' if ansible_architecture == 'x86_64' else 'aarch64' }}"

- name: Проверить наличие wstunnel
  stat:
    path: /usr/local/bin/wstunnel
  register: wstunnel_binary

- name: Скачать wstunnel
  get_url:
    url: "https://github.com/erebe/wstunnel/releases/download/v{{ wstunnel_version }}/wstunnel_{{ wstunnel_version }}_linux_{{ wstunnel_arch }}.tar.gz"
    dest: /tmp/wstunnel.tar.gz
    mode: "0644"
  when: not wstunnel_binary.stat.exists

- name: Распаковать wstunnel
  unarchive:
    src: /tmp/wstunnel.tar.gz
    dest: /usr/local/bin/
    remote_src: true
  when: not wstunnel_binary.stat.exists

- name: Установить права на бинарник
  file:
    path: /usr/local/bin/wstunnel
    mode: "0755"
    owner: root
    group: root

- name: Развернуть systemd unit
  template:
    src: wstunnel.service.j2
    dest: /etc/systemd/system/wstunnel.service
    owner: root
    group: root
    mode: "0644"
  notify: restart wstunnel

- name: Включить и запустить wstunnel
  systemd:
    name: wstunnel
    state: started
    enabled: true
    daemon_reload: true
